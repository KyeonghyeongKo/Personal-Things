<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집밥 레시피</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#E9E3D2;
  --card:#FBF9F1;
  --ink:#2A241C;
  --ink-soft:#6b6252;
  --olive:#55632F;
  --olive-deep:#3f4a22;
  --soy:#6E4326;
  --line:#D6CCB2;
  --line-soft:#E4DcC7;
  --shadow:rgba(59,50,30,.14);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:"IBM Plex Sans KR",system-ui,sans-serif;
  font-weight:400;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
/* subtle woven hanji texture */
body::before{
  content:"";
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-linear-gradient(90deg,rgba(120,105,70,.035) 0 1px,transparent 1px 3px),
    repeating-linear-gradient(0deg,rgba(120,105,70,.035) 0 1px,transparent 1px 3px);
  opacity:.6;
}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 24px 96px}

/* ---------- masthead ---------- */
header{padding:64px 0 32px;text-align:center}
.eyebrow{
  font-size:12px;letter-spacing:.42em;text-transform:none;
  color:var(--olive);font-weight:600;margin-bottom:18px;
}
.eyebrow::before,.eyebrow::after{content:"·";margin:0 .7em;opacity:.6}
h1{
  font-family:"Song Myung",serif;
  font-weight:400;
  font-size:clamp(44px,9vw,84px);
  line-height:.98;
  margin:0;
  letter-spacing:-.01em;
  color:var(--ink);
}
.subtitle{
  margin:20px auto 0;max-width:440px;
  color:var(--ink-soft);font-size:15px;font-weight:300;
}

/* ---------- search ---------- */
.searchbar{
  margin:40px auto 8px;max-width:560px;position:relative;
}
.searchbar svg{
  position:absolute;left:22px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;stroke:var(--ink-soft);pointer-events:none;
}
#q{
  width:100%;
  font-family:inherit;font-size:17px;color:var(--ink);
  padding:18px 22px 18px 56px;
  background:var(--card);
  border:1.5px solid var(--line);
  border-radius:999px;
  box-shadow:0 2px 0 var(--line-soft), 0 10px 24px -18px var(--shadow);
  transition:border-color .2s, box-shadow .2s;
}
#q::placeholder{color:#a89f88;font-weight:300}
#q:focus{
  outline:none;border-color:var(--olive);
  box-shadow:0 0 0 4px rgba(85,99,47,.12), 0 10px 24px -18px var(--shadow);
}
.count{
  text-align:center;margin:16px 0 44px;
  font-size:13px;color:var(--ink-soft);letter-spacing:.02em;
}
.count b{color:var(--olive);font-weight:600}

/* ---------- grid ---------- */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(258px,1fr));
  gap:30px 26px;
}
.card{
  cursor:pointer;background:none;border:none;padding:0;
  text-align:left;font-family:inherit;color:inherit;
  display:flex;flex-direction:column;
  transition:transform .28s cubic-bezier(.2,.7,.2,1);
}
.card:focus-visible{outline:2px solid var(--olive);outline-offset:6px;border-radius:14px}
.card:hover{transform:translateY(-5px)}
.thumb{
  position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;
  background:var(--line-soft);
  box-shadow:0 1px 0 #fff inset, 0 14px 26px -18px var(--shadow);
  border:1px solid var(--line-soft);
}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .5s cubic-bezier(.2,.7,.2,1);}
.card:hover .thumb img{transform:scale(1.05)}
.kind{
  position:absolute;top:12px;left:12px;
  background:rgba(251,249,241,.92);color:var(--soy);
  font-size:11px;font-weight:600;letter-spacing:.14em;
  padding:5px 11px;border-radius:999px;
  backdrop-filter:blur(2px);
}
.card h3{
  font-family:"Song Myung",serif;font-weight:400;
  font-size:22px;line-height:1.3;margin:16px 2px 0;
  color:var(--ink);
}
.card .meta{margin:5px 2px 0;font-size:12.5px;color:var(--ink-soft);font-weight:300}

/* empty state */
.empty{
  grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--ink-soft);
}
.empty .big{font-family:"Song Myung",serif;font-size:26px;color:var(--ink);margin-bottom:8px}

/* ---------- modal ---------- */
.overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(42,36,28,.5);
  backdrop-filter:blur(3px);
  display:flex;align-items:flex-start;justify-content:center;
  padding:40px 20px;overflow-y:auto;
  opacity:0;visibility:hidden;transition:opacity .25s, visibility .25s;
}
.overlay.open{opacity:1;visibility:visible}
.sheet{
  background:var(--card);width:100%;max-width:780px;border-radius:18px;
  overflow:hidden;box-shadow:0 40px 80px -30px rgba(42,36,28,.6);
  transform:translateY(18px) scale(.98);transition:transform .3s cubic-bezier(.2,.8,.2,1);
  border:1px solid var(--line-soft);
}
.overlay.open .sheet{transform:none}
.hero{position:relative;height:240px;background:var(--line-soft)}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero::after{content:"";position:absolute;inset:0;
  background:linear-gradient(to top,rgba(20,16,10,.62),rgba(20,16,10,0) 55%)}
.hero .titlebox{position:absolute;left:0;right:0;bottom:0;padding:26px 30px;color:#fff}
.hero .kind2{font-size:11px;font-weight:600;letter-spacing:.2em;
  color:#f0e9d6;opacity:.9;margin-bottom:8px}
.hero h2{font-family:"Song Myung",serif;font-weight:400;font-size:clamp(28px,5vw,38px);
  margin:0;line-height:1.1;text-shadow:0 2px 12px rgba(0,0,0,.4)}
.close{
  position:absolute;top:16px;right:16px;z-index:2;
  width:40px;height:40px;border-radius:999px;border:none;cursor:pointer;
  background:rgba(251,249,241,.92);color:var(--ink);
  font-size:20px;line-height:1;display:grid;place-items:center;
  transition:background .2s, transform .2s;
}
.close:hover{background:#fff;transform:rotate(90deg)}
.close:focus-visible{outline:2px solid #fff;outline-offset:2px}

.body{display:grid;grid-template-columns:5fr 7fr;gap:0}
.col{padding:32px 30px}
.ingredients{background:#F3EEDF;border-right:1px solid var(--line-soft)}
.sec-label{
  font-size:12px;font-weight:700;letter-spacing:.18em;color:var(--olive);
  margin:0 0 16px;
}
.igroup{margin-bottom:22px}
.igroup:last-child{margin-bottom:0}
.igroup h4{
  font-size:13px;font-weight:600;color:var(--soy);margin:0 0 10px;
  display:flex;align-items:center;gap:8px;
}
.igroup h4::before{content:"";width:14px;height:2px;background:var(--soy);opacity:.5}
.igroup ul{list-style:none;margin:0;padding:0}
.igroup li{
  font-size:14.5px;color:var(--ink);padding:6px 0;
  border-bottom:1px dashed var(--line);display:flex;
}
.igroup li:last-child{border-bottom:none}

.steps ol{list-style:none;margin:0;padding:0;counter-reset:step}
.steps li{
  counter-increment:step;position:relative;
  padding:0 0 22px 46px;font-size:15px;line-height:1.7;color:var(--ink);
}
.steps li:last-child{padding-bottom:0}
.steps li::before{
  content:counter(step);position:absolute;left:0;top:-2px;
  width:30px;height:30px;border-radius:999px;
  background:var(--olive);color:#fff;
  font-family:"Song Myung",serif;font-size:15px;
  display:grid;place-items:center;
}
.steps li::after{
  content:"";position:absolute;left:14.5px;top:32px;bottom:8px;width:1.5px;
  background:var(--line);
}
.steps li:last-child::after{display:none}

footer{text-align:center;margin-top:60px;color:var(--ink-soft);font-size:12px;font-weight:300}

@media(max-width:640px){
  .wrap{padding:0 18px 70px}
  header{padding:48px 0 24px}
  .body{grid-template-columns:1fr}
  .ingredients{border-right:none;border-bottom:1px solid var(--line-soft)}
  .hero{height:200px}
  .overlay{padding:0}
  .sheet{border-radius:0;min-height:100%}
}
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>

<div class="wrap">
  <header>
    <div class="eyebrow">집에서 만드는 한 그릇</div>
    <h1>집밥 레시피</h1>
    <p class="subtitle">오늘 뭐 해 먹지? 먹고 싶은 재료나 요리 이름을 검색해 보세요.</p>
    <div class="searchbar">

</div>

const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const q = document.getElementById('q');
const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');
let lastFocus = null;

const norm = s => s.toLowerCase().replace(/\s+/g,'');

function render(list){
  grid.innerHTML = '';
  if(list.length === 0){
    grid.innerHTML = '<div class="empty"><div class="big">검색 결과가 없어요</div><div>다른 재료나 요리 이름으로 다시 찾아보세요.</div></div>';
    countEl.innerHTML = '';
    return;
  }
  list.forEach(r => {
    const idx = RECIPES.indexOf(r);
    const card = document.createElement('button');
    card.className = 'card';
    card.setAttribute('aria-label', r.title + ' 레시피 열기');
    card.innerHTML =
      '<div class="thumb"><span class="kind">'+r.kind+'</span>'+
      '<img src="'+r.img+'" alt="'+r.title+'" loading="lazy"></div>'+
      '<h3>'+r.title+'</h3>'+
      '<div class="meta">재료 '+r.ingredientGroups.reduce((a,g)=>a+g.items.length,0)+
      '가지 · '+r.steps.length+'단계</div>';
    card.addEventListener('click', () => openRecipe(idx));
    grid.appendChild(card);
  });
}

function updateCount(list, query){
  if(!query){ countEl.innerHTML = '전체 <b>'+RECIPES.length+'</b>개의 레시피'; return; }
  countEl.innerHTML = '‘'+query+'’ 검색결과 <b>'+list.length+'</b>개';
}

function filter(){
  const raw = q.value.trim();
  const nq = norm(raw);
  const list = nq ? RECIPES.filter(r => norm(r.title).includes(nq)) : RECIPES.slice();
  render(list);
  updateCount(list, raw);
}

function openRecipe(idx){
  const r = RECIPES[idx];
  lastFocus = document.activeElement;
  let ing = '';
  r.ingredientGroups.forEach(g => {
    ing += '<div class="igroup"><h4>'+g.label+'</h4><ul>'+
      g.items.map(i => '<li>'+i+'</li>').join('')+'</ul></div>';
  });
  const steps = r.steps.map(s => '<li>'+s+'</li>').join('');
  sheet.innerHTML =
    '<div class="hero">'+
      '<button class="close" id="closeBtn" aria-label="닫기">&times;</button>'+
      '<img src="'+r.img+'" alt="'+r.title+'">'+
      '<div class="titlebox"><div class="kind2">'+r.kind+'</div>'+
      '<h2 id="dishTitle">'+r.title+'</h2></div>'+
    '</div>'+
    '<div class="body">'+
      '<div class="col ingredients"><div class="sec-label">재료</div>'+ing+'</div>'+
      '<div class="col steps"><div class="sec-label">요리법</div><ol>'+steps+'</ol></div>'+
    '</div>';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('closeBtn').addEventListener('click', closeRecipe);
  document.getElementById('closeBtn').focus();
}

function closeRecipe(){
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  if(lastFocus) lastFocus.focus();
}

overlay.addEventListener('click', e => { if(e.target === overlay) closeRecipe(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape' && overlay.classList.contains('open')) closeRecipe(); });
q.addEventListener('input', filter);

filter();
</script>
</body>
</html>
